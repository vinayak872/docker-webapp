<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
display:block;
width:200px;
padding:8px;
margin:10px auto;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 15px;
border:none;
background:#333;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#555;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
